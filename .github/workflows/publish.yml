name: Publish DAGL to PyPI

on:
  push:
    tags:
      - "v*"           # Triggers on version tags like v0.1.0, v1.2.3
  workflow_dispatch:     # Allow manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  # ── Step 1: Build the package ──────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build
        working-directory: unum/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: unum/dist/
          if-no-files-found: error

  # ── Step 2: Publish to TestPyPI (automatic) ───────────────────────────────
  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/dagl
    permissions:
      id-token: write   # Required for OIDC trusted publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ── Step 3: Verify TestPyPI install works ──────────────────────────────────
  verify-testpypi:
    name: Verify TestPyPI install
    needs: publish-testpypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Wait for TestPyPI index to update
        run: sleep 30

      - name: Install from TestPyPI
        run: |
          pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            dagl

      - name: Verify CLI works
        run: dagl --help

      - name: Verify package imports
        run: python -c "import dagl_cli; print(f'dagl {dagl_cli.__version__} installed successfully')"

  # ── Step 4: Publish to PyPI (manual approval required) ─────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: verify-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi               # Requires manual approval in GitHub settings
      url: https://pypi.org/p/dagl
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
