name: Publish DAGL to PyPI

on:
  push:
    tags:
      - "v*"           # Triggers on version tags like v0.1.0, v1.2.3
  workflow_dispatch:     # Allow manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  # ── Step 1: Build for TestPyPI (tessera-flow-qa) ───────────────────────────
  build-test:
    name: Build for TestPyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Patch package name for QA
        run: |
          sed -i 's/name = "tessera-flow"/name = "tessera-flow-qa"/' unum/pyproject.toml
          sed -i 's/tessera = "dagl_cli.dagl:main"/tessera-qa = "dagl_cli.dagl:main"/' unum/pyproject.toml
          sed -i '/^dagl = "dagl_cli.dagl:main"/d' unum/pyproject.toml

      - name: Build sdist and wheel
        run: python -m build
        working-directory: unum/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-test
          path: unum/dist/
          if-no-files-found: error

  # ── Step 2: Build for PyPI (tessera-flow) ──────────────────────────────────
  build:
    name: Build for PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Remove local-only entry point
        run: sed -i '/^dagl = \"dagl_cli.dagl:main\"/d' unum/pyproject.toml

      - name: Build sdist and wheel
        run: python -m build
        working-directory: unum/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: unum/dist/
          if-no-files-found: error

  # ── Step 3: Publish to TestPyPI (automatic) ───────────────────────────────
  publish-testpypi:
    name: Publish to TestPyPI
    needs: build-test
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/tessera-flow-qa
    permissions:
      id-token: write   # Required for OIDC trusted publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-test
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ── Step 4: Verify TestPyPI install works ──────────────────────────────────
  verify-testpypi:
    name: Verify TestPyPI install
    needs: publish-testpypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Wait for TestPyPI index to update
        run: sleep 30

      - name: Install from TestPyPI
        run: |
          pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            tessera-flow-qa

      - name: Verify CLI works
        run: tessera-qa --help

      - name: Verify package imports
        run: python -c "import dagl_cli; print(f'tessera-flow-qa {dagl_cli.__version__} installed successfully')"

  # ── Step 5: Publish to PyPI (manual approval required) ─────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: [build, verify-testpypi]
    runs-on: ubuntu-latest
    environment:
      name: pypi               # Requires manual approval in GitHub settings
      url: https://pypi.org/p/tessera-flow
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
