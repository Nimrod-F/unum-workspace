AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Standalone Greeter function (not part of any workflow)

Resources:
  GreeterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: app.lambda_handler
      Runtime: python3.11
      Timeout: 30

Outputs:
  GreeterFunctionArn:
    Description: ARN of the standalone Greeter function
    Value: !GetAtt GreeterFunction.Arn
